<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Opening Rawabi Shopping…</title>
  <!-- app-argument updated to match ?url= so Smart App Banner passes the product link -->
  <meta
    name="apple-itunes-app"
    content="app-id=6480009147, app-argument=https://rawabihypermarket.com/Zelo-Fleece-Blanket-200X230-Sy2/25512"
  />
</head>
<body style="margin: 0; min-height: 100vh; background: #fafafa">
  <p
    class="loading"
    style="
      font-family: system-ui, sans-serif;
      padding: 1rem;
      color: #333;
      margin: 0;
    "
  >
    Opening product…
  </p>
  <noscript>
    <p>
      <a href="https://rawabihypermarket.com/Zelo-Fleece-Blanket-200X230-Sy2/25512"
        >Continue to product</a
      >
      ·
      <a href="https://play.google.com/store/apps/details?id=com.app.rawabi">Google Play</a>
      ·
      <a href="https://apps.apple.com/qa/app/rawabi-shopping/id6480009147">App Store</a>
    </p>
  </noscript>
  <script>
    /**
     * Bridge → Flutter (app_links / uni_links / go_router).
     *
     * iOS notes:
     * - Universal Links only work in Safari (or when the system hands off the URL).
     *   In-app browsers / in-app WebViews often block handoff; auto-redirect may stay
     *   on this page — we surface explicit HTTPS + custom-scheme links.
     * - Auto-opening the App Store loses product context; we never replace() to the
     *   store alone. Store is a separate tap (itms-apps + https fallback).
     */
    (function () {
      var BRIDGE_HOST = window.location.hostname;

      var CONFIG = {
        productWebUrl:
          "https://rawabihypermarket.com/Zelo-Fleece-Blanket-200X230-Sy2/25512",
        productId: "25512",
        androidPackage: "com.app.rawabi",
        iosAppStoreId: "6480009147",
        playStoreUrl:
          "https://play.google.com/store/apps/details?id=com.app.rawabi",
        appStoreUrl:
          "https://apps.apple.com/qa/app/rawabi-shopping/id6480009147",
        customSchemeUrls: [],
        androidIntentFallback: "web",
        iosCustomSchemeDelayMs: 1400,
        iosHttpsAltDelayMs: 900,
        iosRecoveryUiDelayMs: 2600,
      };

      function extractProductIdFromPath(webUrl) {
        try {
          var p = new URL(webUrl).pathname.replace(/\/+$/, "");
          var last = p.split("/").pop();
          return last && /^\d+$/.test(last) ? last : null;
        } catch (e) {
          return null;
        }
      }

      function buildFlutterDeepLinkCandidates(productId, webUrl) {
        var id = String(productId);
        var base = "https://rawabihypermarket.com";
        return [
          webUrl,
          base + "/product/" + id,
          "rawabi://product/" + id,
          "com.app.rawabi://product/" + id,
          "rawabihypermarket://product/" + id,
          "rawabi://open?productId=" + encodeURIComponent(id),
          "com.app.rawabi://open?productId=" + encodeURIComponent(id),
        ];
      }

      function decodeUrlParam(raw) {
        if (!raw) return raw;
        var s = raw;
        for (var i = 0; i < 3; i++) {
          try {
            var next = decodeURIComponent(s.replace(/\+/g, " "));
            if (next === s) break;
            s = next;
          } catch (e) {
            break;
          }
        }
        return s;
      }

      function parseOverrides() {
        var q = new URLSearchParams(window.location.search);
        var u = q.get("url") || q.get("u");
        if (u) {
          CONFIG.productWebUrl = decodeUrlParam(u);
        }
        var id = q.get("id") || q.get("productId");
        if (!id) id = extractProductIdFromPath(CONFIG.productWebUrl);
        if (id) {
          CONFIG.productId = id;
        }
        CONFIG.customSchemeUrls = buildFlutterDeepLinkCandidates(
          CONFIG.productId,
          CONFIG.productWebUrl
        );
        if (q.get("androidFallback") === "store") {
          CONFIG.androidIntentFallback = "store";
        }
      }

      function injectHeadMeta() {
        var apple = document.querySelector('meta[name="apple-itunes-app"]');
        var appleContent =
          "app-id=" +
          CONFIG.iosAppStoreId +
          ", app-argument=" +
          CONFIG.productWebUrl;
        if (apple) {
          apple.setAttribute("content", appleContent);
        } else {
          var m = document.createElement("meta");
          m.name = "apple-itunes-app";
          m.content = appleContent;
          document.head.appendChild(m);
        }

        var parsed;
        try {
          parsed = new URL(CONFIG.productWebUrl);
        } catch (e) {
          return;
        }
        var hostPath =
          parsed.hostname +
          (parsed.pathname || "") +
          (parsed.search || "");
        var androidAppHref =
          "android-app://" +
          CONFIG.androidPackage +
          "/https/" +
          hostPath;
        var existing = document.querySelector(
          'link[rel="alternate"][href^="android-app://"]'
        );
        if (existing) {
          existing.setAttribute("href", androidAppHref);
        } else {
          var link = document.createElement("link");
          link.rel = "alternate";
          link.href = androidAppHref;
          document.head.appendChild(link);
        }
      }

      function isAndroid(ua) {
        return /android/i.test(ua);
      }

      function isIOS(ua) {
        return (
          /iPhone|iPad|iPod/i.test(ua) ||
          (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1)
        );
      }

      /** Instagram / FB / LINE / WebView shells often block Universal Link handoff. */
      function isIOSInAppBrowser(ua) {
        if (!isIOS(ua)) return false;
        return (
          /(FBAN|FBAV|Instagram|Line\/|Twitter|Snapchat|TikTok|MicroMessenger|Pinterest)/i.test(
            ua
          ) ||
          /\bwv\b/i.test(ua) ||
          /(WKWebView)/i.test(ua)
        );
      }

      function stillOnBridgePage() {
        return window.location.hostname === BRIDGE_HOST;
      }

      function androidFallbackEncoded() {
        var u =
          CONFIG.androidIntentFallback === "store"
            ? CONFIG.playStoreUrl
            : CONFIG.productWebUrl;
        return encodeURIComponent(u);
      }

      function buildAndroidIntentHttps(webUrl, pkg) {
        var parsed;
        try {
          parsed = new URL(webUrl);
        } catch (e) {
          return null;
        }
        if (parsed.protocol !== "https:" && parsed.protocol !== "http:") {
          return null;
        }
        var schemeName = parsed.protocol === "https:" ? "https" : "http";
        var host = parsed.host;
        var pathAndQuery = (parsed.pathname || "/") + (parsed.search || "");
        var intentPath = "intent://" + host + pathAndQuery;
        return (
          intentPath +
          "#Intent;scheme=" +
          schemeName +
          ";package=" +
          pkg +
          ";S.browser_fallback_url=" +
          androidFallbackEncoded() +
          ";end"
        );
      }

      function buildAndroidIntentCustomScheme(productId, pkg, schemeName) {
        schemeName = schemeName || "rawabi";
        return (
          "intent://product/" +
          encodeURIComponent(productId) +
          "#Intent;scheme=" +
          schemeName +
          ";package=" +
          pkg +
          ";S.browser_fallback_url=" +
          androidFallbackEncoded() +
          ";end"
        );
      }

      function tryIframe(url) {
        var el = document.createElement("iframe");
        el.style.display = "none";
        el.style.width = "0";
        el.style.height = "0";
        el.setAttribute("src", url);
        document.documentElement.appendChild(el);
        setTimeout(function () {
          try {
            el.remove();
          } catch (e) {}
        }, 2000);
      }

      function httpsUrlsFromCandidates() {
        return CONFIG.customSchemeUrls.filter(function (u) {
          return u.indexOf("https://") === 0;
        });
      }

      function customSchemeUrlsFromCandidates() {
        return CONFIG.customSchemeUrls.filter(function (u) {
          return u.indexOf("https://") !== 0;
        });
      }

      /** Fire custom schemes (iframe + last via location). */
      function openIOSCustomSchemes() {
        var schemes = customSchemeUrlsFromCandidates();
        for (var i = 0; i < schemes.length; i++) {
          tryIframe(schemes[i]);
        }
        if (schemes.length) {
          window.location.href = schemes[schemes.length - 1];
        }
      }

      /** Second HTTPS shape (e.g. /product/123) if different from primary — helps routing mismatches. */
      function tryAlternateHttpsUrl() {
        var list = httpsUrlsFromCandidates();
        if (list.length < 2) return;
        if (list[0] === list[1]) return;
        try {
          window.location.replace(list[1]);
        } catch (e) {}
      }

      function installTapToOpen(href, label) {
        var loading = document.querySelector(".loading");
        if (loading) loading.style.display = "none";
        var a = document.createElement("a");
        a.id = "bridge-tap-primary";
        a.href = href;
        a.setAttribute(
          "style",
          [
            "display:block",
            "box-sizing:border-box",
            "min-height:60vh",
            "padding:1.25rem",
            "font-family:system-ui,sans-serif",
            "font-size:1rem",
            "color:#0b57d0",
            "text-decoration:underline",
          ].join(";")
        );
        a.textContent = label;
        document.body.appendChild(a);
      }

      function itmsAppStoreUrl() {
        return (
          "itms-apps://apps.apple.com/app/id" + encodeURIComponent(CONFIG.iosAppStoreId)
        );
      }

      /**
       * If still on bridge: show product + app deep links + App Store (no auto-redirect to store).
       * Covers: in-app WebView, blocked redirects, user returned from app without navigation.
       */
      function showIOSRecoveryUI(inAppHint) {
        if (!stillOnBridgePage()) return;
        var loading = document.querySelector(".loading");
        if (loading) loading.style.display = "none";

        var existing = document.querySelector(".ios-recovery");
        if (existing) return;

        var firstTap = document.getElementById("bridge-tap-primary");
        if (firstTap) firstTap.style.display = "none";

        var wrap = document.createElement("div");
        wrap.className = "ios-recovery";
        wrap.setAttribute(
          "style",
          [
            "box-sizing:border-box",
            "padding:1rem 1.25rem 2rem",
            "font-family:system-ui,sans-serif",
            "max-width:28rem",
            "margin:0 auto",
          ].join(";")
        );

        var title = document.createElement("p");
        title.style.cssText =
          "margin:0 0 0.75rem;font-weight:600;color:#1a1a1a;font-size:1.05rem";
        title.textContent = "Open this product";

        var hint = document.createElement("p");
        hint.style.cssText = "margin:0 0 1rem;font-size:0.9rem;color:#555;line-height:1.45";
        hint.textContent = inAppHint
          ? "This screen opened inside another app’s browser. Universal Links often don’t work here — use a button below, or open this page in Safari (Share → Open in Safari)."
          : "If the app or website didn’t open automatically, use one of the links below.";

        wrap.appendChild(title);
        wrap.appendChild(hint);

        function addButton(href, label, primary) {
          var a = document.createElement("a");
          a.href = href;
          a.textContent = label;
          a.setAttribute(
            "style",
            [
              "display:block",
              "box-sizing:border-box",
              "padding:0.85rem 1rem",
              "margin-bottom:0.6rem",
              "border-radius:10px",
              "text-align:center",
              "text-decoration:none",
              "font-weight:600",
              "font-size:0.95rem",
              primary
                ? "background:#0b57d0;color:#fff"
                : "background:#fff;color:#0b57d0;border:1px solid #c7d2f0",
            ].join(";")
          );
          wrap.appendChild(a);
        }

        addButton(CONFIG.productWebUrl, "Open product page (website)", true);

        var canonical =
          "https://rawabihypermarket.com/product/" + encodeURIComponent(CONFIG.productId);
        if (canonical !== CONFIG.productWebUrl.split("?")[0]) {
          addButton(
            canonical,
            "Open product (alternate link)",
            false
          );
        }

        addButton(
          "rawabi://product/" + encodeURIComponent(CONFIG.productId),
          "Open in Rawabi app (deep link)",
          false
        );

        addButton(itmsAppStoreUrl(), "App Store — Rawabi Shopping", false);
        addButton(CONFIG.appStoreUrl, "App Store (in browser)", false);

        var copyBtn = document.createElement("button");
        copyBtn.type = "button";
        copyBtn.textContent = "Copy product link";
        copyBtn.setAttribute(
          "style",
          [
            "display:block",
            "width:100%",
            "margin-top:0.75rem",
            "padding:0.65rem",
            "font:inherit",
            "border-radius:8px",
            "border:1px solid #ccc",
            "background:#f0f0f0",
            "cursor:pointer",
          ].join(";")
        );
        copyBtn.addEventListener("click", function () {
          var url = CONFIG.productWebUrl;
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(
              function () {
                copyBtn.textContent = "Copied";
              },
              function () {
                window.prompt("Copy this link:", url);
              }
            );
          } else {
            window.prompt("Copy this link:", url);
          }
        });
        wrap.appendChild(copyBtn);

        document.body.appendChild(wrap);
      }

      function scheduleIOS(ua) {
        var productUrl = CONFIG.productWebUrl;
        var pageHidden = false;
        document.addEventListener(
          "visibilitychange",
          function () {
            if (document.hidden) pageHidden = true;
          },
          { once: true }
        );

        var inApp = isIOSInAppBrowser(ua);

        installTapToOpen(
          productUrl,
          "Tap to open product (Safari / app if installed)"
        );

        if (inApp) {
          openIOSCustomSchemes();
          setTimeout(function () {
            if (!stillOnBridgePage() || pageHidden) return;
            try {
              window.location.replace(productUrl);
            } catch (e) {}
          }, 380);
        } else {
          try {
            window.location.replace(productUrl);
          } catch (e) {}
        }

        setTimeout(function () {
          if (!stillOnBridgePage() || pageHidden) return;
          tryAlternateHttpsUrl();
        }, CONFIG.iosHttpsAltDelayMs);

        setTimeout(function () {
          if (!stillOnBridgePage() || pageHidden) return;
          openIOSCustomSchemes();
        }, CONFIG.iosCustomSchemeDelayMs);

        setTimeout(function () {
          if (!stillOnBridgePage() || pageHidden) return;
          showIOSRecoveryUI(inApp);
        }, CONFIG.iosRecoveryUiDelayMs);
      }

      function scheduleAndroid(intentHttps, intentRawabi) {
        var primary = intentHttps || CONFIG.productWebUrl;

        installTapToOpen(
          primary,
          "Tap to open in the Rawabi app (Chrome may block automatic open)"
        );

        tryIframe(intentRawabi);

        window.location.replace(primary);
      }

      parseOverrides();
      injectHeadMeta();

      var ua = navigator.userAgent || "";

      if (!isAndroid(ua) && !isIOS(ua)) {
        window.location.replace(CONFIG.productWebUrl);
        return;
      }

      if (isAndroid(ua)) {
        var intentHttps = buildAndroidIntentHttps(
          CONFIG.productWebUrl,
          CONFIG.androidPackage
        );
        var intentRawabi = buildAndroidIntentCustomScheme(
          CONFIG.productId,
          CONFIG.androidPackage,
          "rawabi"
        );
        scheduleAndroid(intentHttps, intentRawabi);
        return;
      }

      if (isIOS(ua)) {
        scheduleIOS(ua);
      }
    })();
  </script>
</body>
</html>
