<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ahlan — Redirecting…</title>
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0f1419;
      color: #9aa5b1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    a { color: #c9a227; }
    .links { margin-top: 1rem; font-size: 0.9rem; line-height: 1.8; }
  </style>
  <script>
    (function () {
      var PLAY =
        "https://play.google.com/store/apps/details?id=com.nipuna.loyalty&hl=en";
      var APP_STORE =
        "https://apps.apple.com/qa/app/ahlan-rawabi/id6449727046";
      var WEB = "https://rawabihypermarket.com/ahlan_reward";
      var ua = navigator.userAgent;
      var isIPadOS =
        navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1;
      if (/android/i.test(ua)) {
        window.location.replace(PLAY);
      } else if (/iPhone|iPad|iPod/i.test(ua) || isIPadOS) {
        window.location.replace(APP_STORE);
      } else {
        window.location.replace(WEB);
      }
    })();
  </script>
</head>
<body>
  <div>
    <p>Redirecting…</p>
    <p class="links">
      <a href="https://play.google.com/store/apps/details?id=com.nipuna.loyalty&amp;hl=en">Google Play</a>
      ·
      <a href="https://apps.apple.com/qa/app/ahlan-rawabi/id6449727046">App Store</a>
      ·
      <a href="https://rawabihypermarket.com/ahlan_reward">Website</a>
    </p>
  </div>
  <noscript>
    <p>
      <a href="https://play.google.com/store/apps/details?id=com.nipuna.loyalty&amp;hl=en">Google Play</a>

      |
      <a href="https://rawabihypermarket.com/ahlan_reward">Website</a>
    </p>
  </noscript>
</body>
</html>
