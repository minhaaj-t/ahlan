<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ahlan — Get the app</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a222d;
      --text: #f2f4f7;
      --muted: #9aa5b1;
      --accent: #c9a227;
      --play: #01875f;
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .landing {
      display: none;
      min-height: 100dvh;
      padding: 1.5rem;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.75rem;
      text-align: center;
    }
    .landing.is-visible { display: flex; }
    .brand {
      font-size: clamp(1.75rem, 5vw, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .brand span { color: var(--accent); }
    .tagline {
      max-width: 280px;
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--muted);
      margin: -0.5rem 0 0;
    }
    .actions {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.75rem;
      width: 100%;
      max-width: 280px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      min-height: 52px;
      padding: 0 1.25rem;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    .btn:active { transform: scale(0.98); }
    .btn-appstore {
      background: #000;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .btn-play {
      background: var(--play);
    }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      font-weight: 500;
      font-size: 0.9rem;
      min-height: 44px;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .btn-ghost:hover, .btn-ghost:focus-visible {
      color: var(--text);
      border-color: rgba(255,255,255,0.2);
    }
    .btn svg { flex-shrink: 0; }
  </style>
  <script>
    (function () {
      var WEB = "https://rawabihypermarket.com/ahlan_reward";
      var ua = navigator.userAgent;
      var isAndroid = /android/i.test(ua);
      var isIOS = /iPhone|iPad|iPod/i.test(ua);

      function onReady(fn) {
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", fn);
        } else fn();
      }

      if (isAndroid) {
        onReady(function () {
          var el = document.getElementById("android-landing");
          el.classList.add("is-visible");
          el.setAttribute("aria-hidden", "false");
        });
      } else if (isIOS) {
        onReady(function () {
          var el = document.getElementById("ios-landing");
          el.classList.add("is-visible");
          el.setAttribute("aria-hidden", "false");
        });
      } else {
        window.location.replace(WEB);
      }
    })();
  </script>
</head>
