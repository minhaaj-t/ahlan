<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f2f2f7" />
  <title>Ahlan Rawabi</title>
  <link rel="dns-prefetch" href="https://play.google.com" />
  <link rel="dns-prefetch" href="https://apps.apple.com" />
  <link rel="dns-prefetch" href="https://rawabihypermarket.com" />
  <link rel="preconnect" href="https://play.google.com" crossorigin />
  <link rel="preconnect" href="https://apps.apple.com" crossorigin />
  <link rel="preconnect" href="https://rawabihypermarket.com" crossorigin />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #f2f2f7;
      -webkit-tap-highlight-color: transparent;
    }
    .wrap {
      min-height: 100%;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    /* iOS-style UIActivityIndicator (rotating arc) */
    .ios-spin {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2.5px solid rgba(60, 60, 67, 0.18);
      border-top-color: rgba(60, 60, 67, 0.85);
      box-sizing: border-box;
      animation: ios-rot 0.55s linear infinite;
    }
    @keyframes ios-rot {
      to { transform: rotate(360deg); }
    }
    @media (prefers-color-scheme: dark) {
      html, body { background: #000; }
      .ios-spin {
        border-color: rgba(235, 235, 245, 0.2);
        border-top-color: rgba(235, 235, 245, 0.85);
      }
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="ios-spin" aria-hidden="true"></div>
    <p class="sr-only">Loading</p>
  </div>
  <noscript>
    <p style="text-align:center;padding:2rem;font-family:system-ui,sans-serif;">
      <a href="https://rawabihypermarket.com/ahlan_reward">Continue to Ahlan Rewards</a>
    </p>
  </noscript>
  <script>
    (function () {
      var ua = navigator.userAgent;
      var isIPadOS = /Macintosh/.test(ua) && navigator.maxTouchPoints > 1;
      var url;
      if (/android/i.test(ua)) {
        url = "https://play.google.com/store/apps/details?id=com.nipuna.loyalty&hl=en";
      } else if (/iPhone|iPad|iPod/i.test(ua) || isIPadOS) {
        url = "https://apps.apple.com/qa/app/ahlan-rawabi/id6449727046";
      } else {
        url = "https://rawabihypermarket.com/ahlan_reward";
      }

      var isStore = /play\.google\.com|apps\.apple\.com/.test(url);

      function handoff() {
        if (isStore) {
          var w = window.open(url, "_blank", "noopener,noreferrer");
          if (w) {
            try {
              w.opener = null;
            } catch (e) {}
            window.close();
            setTimeout(function () {
              if (!window.closed) {
                window.location.replace(url);
              }
            }, 150);
            return;
          }
        }
        window.location.replace(url);
      }

      /* Let the spinner paint one frame, then hand off (fastest path still shows UI) */
      requestAnimationFrame(handoff);
    })();
  </script>
</body>
</html>
